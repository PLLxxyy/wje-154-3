<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手工作坊 - 发现手工之美</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f5f5f0; color: #333; line-height: 1.6; }
      a { text-decoration: none; color: inherit; }
      button { cursor: pointer; border: none; font-family: inherit; }
      input, textarea, select { font-family: inherit; }

      /* ===== Header ===== */
      .site-header { background: #fff; border-bottom: 1px solid #e8e4df; position: sticky; top: 0; z-index: 100; }
      .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
      .logo { font-size: 22px; font-weight: 700; color: #b8860b; letter-spacing: 1px; }
      .logo span { color: #8b6914; }
      .header-nav { display: flex; align-items: center; gap: 20px; }
      .header-nav a, .header-nav button { font-size: 14px; color: #666; transition: color .2s; background: none; }
      .header-nav a:hover, .header-nav button:hover { color: #b8860b; }
      .user-avatar-small { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid #e8e4df; }
      .btn-publish { background: #b8860b !important; color: #fff !important; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; }
      .btn-publish:hover { background: #9a7209 !important; }

      /* ===== Layout ===== */
      .main-content { max-width: 1200px; margin: 0 auto; padding: 20px 24px; min-height: calc(100vh - 60px); }

      /* ===== Search & Filter Bar ===== */
      .filter-bar { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
      .search-row { display: flex; gap: 12px; margin-bottom: 14px; }
      .search-input { flex: 1; height: 40px; border: 1px solid #ddd; border-radius: 20px; padding: 0 16px; font-size: 14px; outline: none; transition: border-color .2s; }
      .search-input:focus { border-color: #b8860b; }
      .search-btn { height: 40px; padding: 0 24px; background: #b8860b; color: #fff; border-radius: 20px; font-size: 14px; font-weight: 500; }
      .search-btn:hover { background: #9a7209; }
      .category-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .category-chip { padding: 5px 14px; border-radius: 16px; font-size: 13px; background: #f0ece4; color: #666; cursor: pointer; transition: all .2s; border: 1px solid transparent; }
      .category-chip:hover { background: #e8e0d0; }
      .category-chip.active { background: #b8860b; color: #fff; border-color: #b8860b; }
      .sort-group { margin-left: auto; display: flex; gap: 8px; }
      .sort-btn { padding: 5px 14px; border-radius: 16px; font-size: 13px; background: transparent; color: #888; cursor: pointer; border: 1px solid #ddd; transition: all .2s; }
      .sort-btn.active { background: #333; color: #fff; border-color: #333; }

      /* ===== Masonry / Waterfall ===== */
      .waterfall { columns: 4; column-gap: 16px; }
      .work-card { break-inside: avoid; margin-bottom: 16px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: transform .2s, box-shadow .2s; cursor: pointer; }
      .work-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
      .card-cover { width: 100%; display: block; object-fit: cover; }
      .card-body { padding: 12px 14px; }
      .card-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .card-meta { display: flex; align-items: center; justify-content: space-between; }
      .card-author { display: flex; align-items: center; gap: 6px; }
      .card-author img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
      .card-author span { font-size: 12px; color: #888; }
      .card-likes { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #999; }
      .card-likes .heart { color: #e74c3c; }

      /* ===== Detail Page ===== */
      .detail-page { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
      .detail-main { background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
      .detail-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
      .detail-info { display: flex; gap: 16px; font-size: 13px; color: #888; margin-bottom: 20px; }
      .detail-info .tag { background: #f0ece4; padding: 2px 10px; border-radius: 10px; }
      .step-list { margin-top: 24px; }
      .step-item { margin-bottom: 28px; }
      .step-num { display: inline-block; width: 28px; height: 28px; background: #b8860b; color: #fff; border-radius: 50%; text-align: center; line-height: 28px; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
      .step-img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
      .step-text { font-size: 14px; color: #555; line-height: 1.7; }
      .sidebar { display: flex; flex-direction: column; gap: 16px; }
      .sidebar-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
      .sidebar-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #333; }
      .material-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0ece4; font-size: 13px; }
      .material-item:last-child { border-bottom: none; }
      .difficulty-badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 13px; font-weight: 500; }
      .difficulty-easy { background: #e8f5e9; color: #388e3c; }
      .difficulty-medium { background: #fff3e0; color: #f57c00; }
      .difficulty-hard { background: #fce4ec; color: #c62828; }

      /* Author card */
      .author-card { text-align: center; }
      .author-card img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; }
      .author-card .name { font-size: 15px; font-weight: 600; }
      .author-card .bio { font-size: 12px; color: #888; margin: 4px 0 10px; }
      .author-stats { display: flex; justify-content: center; gap: 20px; font-size: 12px; color: #999; margin-bottom: 12px; }
      .btn-follow { padding: 6px 24px; border-radius: 16px; font-size: 13px; font-weight: 500; transition: all .2s; }
      .btn-follow.following { background: #f0ece4; color: #888; }
      .btn-follow:not(.following) { background: #b8860b; color: #fff; }
      .btn-follow:not(.following):hover { background: #9a7209; }

      /* Action bar */
      .action-bar { display: flex; gap: 16px; padding: 16px 0; border-top: 1px solid #f0ece4; margin-top: 16px; }
      .action-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 20px; font-size: 14px; background: #f0ece4; color: #666; transition: all .2s; }
      .action-btn:hover { background: #e8e0d0; }
      .action-btn.liked { background: #fce4ec; color: #e74c3c; }
      .action-btn.favorited { background: #fff3e0; color: #f57c00; }

      /* Comments */
      .comments-section { margin-top: 24px; }
      .comment-input-wrap { display: flex; gap: 12px; margin-bottom: 20px; }
      .comment-input-wrap textarea { flex: 1; height: 60px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; resize: none; outline: none; }
      .comment-input-wrap textarea:focus { border-color: #b8860b; }
      .comment-submit { align-self: flex-end; padding: 8px 20px; background: #b8860b; color: #fff; border-radius: 16px; font-size: 13px; }
      .comment-submit:hover { background: #9a7209; }
      .comment-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f5f2ec; }
      .comment-item img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
      .comment-body { flex: 1; }
      .comment-author { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
      .comment-time { font-size: 11px; color: #bbb; margin-bottom: 6px; }
      .comment-text { font-size: 14px; color: #555; }

      /* ===== Publish Page ===== */
      .publish-page { max-width: 720px; margin: 0 auto; }
      .publish-page h2 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
      .form-section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
      .form-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #b8860b; }
      .form-group { margin-bottom: 16px; }
      .form-group label { display: block; font-size: 13px; font-weight: 500; color: #666; margin-bottom: 6px; }
      .form-group input, .form-group select, .form-group textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; transition: border-color .2s; }
      .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #b8860b; }
      .form-group textarea { min-height: 80px; resize: vertical; }
      .step-editor { background: #faf9f6; border-radius: 8px; padding: 16px; margin-bottom: 12px; position: relative; }
      .step-editor .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      .step-editor .step-number { font-size: 14px; font-weight: 600; color: #b8860b; }
      .btn-remove-step { background: none; color: #e74c3c; font-size: 12px; padding: 2px 8px; border-radius: 4px; }
      .btn-remove-step:hover { background: #fce4ec; }
      .btn-add-step { width: 100%; padding: 12px; background: #f0ece4; border-radius: 8px; font-size: 14px; color: #b8860b; font-weight: 500; transition: background .2s; }
      .btn-add-step:hover { background: #e8e0d0; }
      .btn-submit-work { width: 100%; padding: 14px; background: #b8860b; color: #fff; border-radius: 24px; font-size: 16px; font-weight: 600; margin-top: 8px; transition: background .2s; }
      .btn-submit-work:hover { background: #9a7209; }
      .tips-area { margin-top: 4px; }
      .tips-area textarea { min-height: 60px; }

      /* ===== Profile Page ===== */
      .profile-header { background: #fff; border-radius: 12px; padding: 28px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.05); display: flex; align-items: center; gap: 20px; }
      .profile-avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; }
      .profile-info h2 { font-size: 20px; font-weight: 700; }
      .profile-info .bio { font-size: 13px; color: #888; margin-top: 4px; }
      .profile-stats { display: flex; gap: 24px; margin-top: 8px; font-size: 13px; color: #999; }
      .profile-stats span strong { color: #333; }
      .tabs { display: flex; gap: 0; border-bottom: 2px solid #e8e4df; margin-bottom: 20px; }
      .tab-btn { padding: 10px 24px; font-size: 14px; font-weight: 500; color: #888; background: none; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
      .tab-btn.active { color: #b8860b; border-bottom-color: #b8860b; }
      .empty-state { text-align: center; padding: 60px 20px; color: #bbb; font-size: 15px; }
      .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
      .work-manage-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.05); display: flex; gap: 16px; align-items: center; }
      .work-manage-card img { width: 100px; height: 80px; border-radius: 8px; object-fit: cover; }
      .work-manage-info { flex: 1; }
      .work-manage-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
      .work-manage-info p { font-size: 12px; color: #888; }
      .work-manage-actions { display: flex; gap: 8px; }
      .btn-manage { padding: 5px 14px; border-radius: 14px; font-size: 12px; border: 1px solid #ddd; background: #fff; color: #666; transition: all .2s; }
      .btn-manage:hover { border-color: #b8860b; color: #b8860b; }
      .btn-manage.danger { border-color: #e74c3c; color: #e74c3c; }
      .btn-manage.danger:hover { background: #fce4ec; }

      /* ===== Modal ===== */
      .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: center; justify-content: center; }
      .modal-box { background: #fff; border-radius: 16px; padding: 28px; width: 400px; max-width: 90vw; }
      .modal-box h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
      .modal-box input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 14px; margin-bottom: 16px; outline: none; }
      .modal-box input:focus { border-color: #b8860b; }
      .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
      .modal-actions button { padding: 8px 20px; border-radius: 16px; font-size: 13px; }
      .btn-cancel { background: #f0ece4; color: #666; }
      .btn-confirm { background: #b8860b; color: #fff; }

      /* ===== Responsive ===== */
      @media (max-width: 900px) {
        .waterfall { columns: 2; }
        .detail-page { grid-template-columns: 1fr; }
      }
      @media (max-width: 600px) {
        .waterfall { columns: 1; }
        .header-inner { padding: 0 12px; }
        .main-content { padding: 12px; }
      }

      /* ===== Placeholder Images ===== */
      .placeholder-img {
        background: linear-gradient(135deg, #f0ece4 0%, #e8e0d0 100%);
        display: flex; align-items: center; justify-content: center;
        font-size: 36px;
      }
      .back-link { display: inline-flex; align-items: center; gap: 4px; font-size: 14px; color: #888; margin-bottom: 16px; cursor: pointer; }
      .back-link:hover { color: #b8860b; }
      .loading-spinner { text-align: center; padding: 40px; color: #999; }

      /* ===== Material Comparison ===== */
      .material-summary { margin-bottom: 12px; }
      .summary-bar { height: 6px; background: #f0ece4; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
      .summary-fill { height: 100%; background: linear-gradient(90deg, #b8860b, #d4a843); border-radius: 3px; transition: width .4s ease; }
      .summary-text { display: flex; justify-content: space-between; font-size: 12px; }
      .owned-text { color: #388e3c; font-weight: 500; }
      .missing-text { color: #e74c3c; font-weight: 500; }
      .all-ready-text { color: #388e3c; font-weight: 600; }
      .material-status { margin-right: 6px; font-size: 12px; }
      .material-item.material-owned { background: #f0f8f0; border-radius: 4px; padding-left: 8px; }
      .material-item.material-missing { background: #fff0f0; border-radius: 4px; padding-left: 8px; }

      /* ===== My Materials Page ===== */
      .my-materials-page { max-width: 720px; margin: 0 auto; }
      .my-materials-page h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
      .inventory-add-card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
      .inventory-add-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #b8860b; }
      .inventory-form { display: flex; flex-direction: column; gap: 12px; }
      .category-toggle { display: flex; gap: 8px; }
      .toggle-btn { flex: 1; padding: 8px 16px; border-radius: 8px; font-size: 14px; background: #f0ece4; color: #888; transition: all .2s; border: 2px solid transparent; }
      .toggle-btn.active { background: #fff8e8; color: #b8860b; border-color: #b8860b; font-weight: 500; }
      .toggle-btn:hover { background: #e8e0d0; }
      .btn-add-inventory { padding: 10px 24px; background: #b8860b; color: #fff; border-radius: 20px; font-size: 14px; font-weight: 500; transition: background .2s; align-self: flex-end; }
      .btn-add-inventory:hover { background: #9a7209; }
      .btn-add-inventory:disabled { background: #ccc; cursor: not-allowed; }
      .inventory-stats { display: flex; gap: 12px; margin-bottom: 20px; }
      .stat-card { flex: 1; background: #fff; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
      .stat-num { display: block; font-size: 24px; font-weight: 700; color: #b8860b; }
      .stat-label { font-size: 12px; color: #999; }
      .inventory-filter { display: flex; gap: 8px; margin-bottom: 16px; }
      .filter-chip { padding: 6px 16px; border-radius: 16px; font-size: 13px; background: #f0ece4; color: #666; border: 1px solid transparent; transition: all .2s; cursor: pointer; }
      .filter-chip.active { background: #b8860b; color: #fff; border-color: #b8860b; }
      .filter-chip:hover { background: #e8e0d0; }
      .inventory-list { display: flex; flex-direction: column; gap: 8px; }
      .inventory-item { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.05); transition: transform .15s; }
      .inventory-item:hover { transform: translateX(2px); }
      .inventory-icon { font-size: 20px; flex-shrink: 0; }
      .inventory-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
      .inventory-name { font-size: 14px; font-weight: 500; color: #333; }
      .inventory-note { font-size: 12px; color: #999; }
      .btn-remove-inventory { padding: 4px 12px; border-radius: 12px; font-size: 12px; color: #e74c3c; background: none; border: 1px solid #f5c6c6; transition: all .2s; }
      .btn-remove-inventory:hover { background: #fce4ec; border-color: #e74c3c; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
